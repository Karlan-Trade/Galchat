name: galchat
description: AI-powered Galgame-style chat app. Chat with 初雪, an android catgirl
  in a modern campus setting, with branching choices and affection tracking.
publish_to: 'none'
version: 0.5.0+19

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local database
  drift: ^2.16.1
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.21

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Networking
  http: ^1.2.1

  # File & path
  path_provider: ^2.1.3

  # Markdown rendering
  flutter_markdown: ^0.7.7
  url_launcher: ^6.3.1

  # File picker
  file_picker: 11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  drift_dev: ^2.16.1
  build_runner: ^2.4.9

  # Test utilities
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
